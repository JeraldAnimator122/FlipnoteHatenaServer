<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=226">
    <link rel="stylesheet" type="text/css" href="/ds/css-ds/welcome-ugoUser.css">
</head>
<body class="profile-page">
    <div class="container">
        <div class="profile-header">
            <span class="user-name">{{ USERNAME }}</span>
            <span class="id-display">ID: {{ FSID }}</span>
        </div>

        <div class="user-card">
            <div class="avatar-box">
                <img src="/themes/classic_blue/frog_walker.gif" width="32" height="32">
            </div>
            <div class="stats-box">
                <p>Flipnotes: <strong>{{ UPLOAD_COUNT }}</strong></p>
                <p>Stars: <strong>{{ STAR_COUNT }}</strong></p>
            </div>
        </div>

        <div class="hr-dashed"></div>

        <div class="menu-list">
            <a href="/ds/v2-us/data/FSIDugoUploadedflip.py" class="menu-item">
                <div class="icon">📄</div>
                <div class="label">My Uploaded Flipnotes</div>
            </a>

            <a href="/ds/v2-us/data/Likedugoflipnote.py" class="menu-item">
                <div class="icon">★</div>
                <div class="label">Liked Flipnotes</div>
            </a>

            <a href="/ds/v2-us/data/hotugoFlipnote.py" class="menu-item">
                <div class="icon">🔥</div>
                <div class="label">Hot Flipnotes</div>
            </a>
        </div>

        <div class="footer-actions">
            <a href="settings.htm" class="btn-small">System Settings</a>
            <a href="upload.htm" class="btn-primary">Post a Flipnote</a>
        </div>
    </div>
</body>
</html>
